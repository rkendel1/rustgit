app = "trythissoftware-portal"

[build]
  dockerfile = "portal/Dockerfile"

[env]
  NEXT_PUBLIC_API_URL = "https://api.trythissoftware.com"
  NEXT_PUBLIC_BASE_DOMAIN = "trythissoftware.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  # Allow up to 5 minutes so the Next.js proxy can wait on long analyze calls.
  idle_timeout = 300
