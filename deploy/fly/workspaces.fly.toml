app = "trythissoftware-workspaces"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BASE_DOMAIN = "trythissoftware.com"
  WORKSPACE_ROOT = "/data/workspaces"

[[mounts]]
  source = "workspace_data"
  destination = "/data/workspaces"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
