app = "rustgit"
primary_region = "ord"

[build]
  dockerfile = "portal/Dockerfile"

[env]
  NEXT_PUBLIC_API_URL = "https://api.trythissoftware.com"
  NEXT_PUBLIC_BASE_DOMAIN = "trythissoftware.com"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one portal machine warm to avoid cold-start blank-screen behavior on first request.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  # Frontend machine sizing for Next.js standalone runtime.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
